name: ProLink Frontend CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Frontend
    runs-on: [self-hosted, linux, docker, prolink-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Docker
        run: sudo docker version

      - name: Build frontend Docker image
        run: sudo docker build -t prolink-frontend:latest ./prolink-fe

  deploy:
    name: Deploy Frontend Container
    runs-on: [self-hosted, linux, docker, prolink-frontend]
    needs: build

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: sudo docker build -t prolink-frontend:latest ./prolink-fe

      - name: Stop old frontend container
        run: sudo docker stop prolink-frontend || true

      - name: Remove old frontend container
        run: sudo docker rm prolink-frontend || true

      - name: Run frontend container
        run: |
          sudo docker run -d \
            --name prolink-frontend \
            -p 5173:80 \
            prolink-frontend:latest

      - name: Wait for frontend startup
        run: sleep 5

      - name: Show frontend container status
        run: sudo docker ps -a --filter "name=prolink-frontend"

      - name: Show frontend logs
        run: sudo docker logs prolink-frontend --tail 80

      - name: Health check frontend
        run: curl -I http://localhost:5173